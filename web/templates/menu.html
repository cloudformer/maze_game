<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>迷宫 · 坦克大战</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h2>迷 宫 · 坦 克 大 战</h2>

  <div class="menu">
    <h3>玩</h3>
    <div class="row">
      <label>地图
        <select id="level">
          {% for lv, size in sizes.items() %}
            <option value="{{ lv }}" {% if lv == 3 %}selected{% endif %}>{{ size }}x{{ size }}</option>
          {% endfor %}
        </select>
      </label>
      <a class="btn" href="#" onclick="go('/play?mode=single')">单人闯关</a>
      <a class="btn" href="#" onclick="go('/play?mode=vs')">多人对战</a>
    </div>

    <h3>机器人比赛(勾选参赛的,只跑勾中的)</h3>
    <div class="row">
      {% for b in bots %}
        <label class="chk"><input type="checkbox" class="botchk" value="{{ b.id }}"> {{ b.name }} · {{ b.author }}</label>
      {% endfor %}
      <a class="btn" href="#" onclick="runBots()">开跑 ▶</a>
    </div>

    <h3>看录像</h3>
    {% if plays %}
      <table class="plays">
        <tr><th>交易</th><th>玩家</th><th>地图</th><th>步数</th><th></th></tr>
        {% for p in plays %}
        <tr>
          <td>#{{ p.id }}</td>
          <td>{{ p.name }}</td>
          <td>{{ p.size }}</td>
          <td>{{ p.steps }}</td>
          <td><a href="/replay?id={{ p.id }}">▶ 回放</a></td>
        </tr>
        {% endfor %}
      </table>
    {% else %}
      <p class="keys">还没有录像,赢一局就有了。</p>
    {% endif %}
  </div>

<script>
  // 带上下拉里选的地图大小(玩 和 机器人比赛 都用它)
  function go(url) {
    location = url + '&level=' + document.getElementById('level').value;
  }
  // 只跑勾选的 bot:收集勾中的编号 -> /bot?ids=1,3
  function runBots() {
    const ids = [...document.querySelectorAll('.botchk:checked')].map(c => c.value);
    if (ids.length === 0) { alert('先勾选至少一个 bot'); return; }
    go('/bot?ids=' + ids.join(','));
  }
</script>
</body>
</html>
